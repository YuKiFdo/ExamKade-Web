name: Web Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Create .env.local for build
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      - name: Install Dependencies
        run: npm install

      - name: Build NextJS project
        run: npm run build

      - name: Package build
        run: |
          tar -czf build.tar.gz .next public package.json package-lock.json ecosystem.config.cjs .env.local

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload build to Azure VM
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no build.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.PROJECT_DIR }}

      - name: Deploy on Azure VM
        run: |
          set -e
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          cd ${{ secrets.PROJECT_DIR }}

          # Extract new files
          tar -xzf build.tar.gz
          
          # Install production dependencies
          npm install --production
          
          # Reload PM2 ecosystem
          npx pm2 reload ecosystem.config.cjs --env production
          
          # Clean up tarball
          rm build.tar.gz
          EOF
